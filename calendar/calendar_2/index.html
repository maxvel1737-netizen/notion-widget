<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Modular Widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --accent-color: #2383e2;
            --accent-text: #ffffff;
            --border-color: #e9e9e6;
            --hover-color: #f1f1ef;
            --muted-text: #787774;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #ffffff;
                --accent-color: #2383e2;
                --accent-text: #ffffff;
                --border-color: #2f2f2f;
                --hover-color: #242424;
                --muted-text: #9b9b9b;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            user-select: none;
        }

        /* Меню налаштувань (Toggle) */
        .settings-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            z-index: 100;
        }

        details {
            background: var(--hover-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
        }

        summary {
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            color: var(--muted-text);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            padding-left: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        /* Головна сітка віджета */
        .widget-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .widget-block {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            display: none; /* Керується через JS */
        }

        /* Адаптивні класи ширини */
        .w-full {
            flex: 1 1 100%;
        }
        
        .w-half {
            flex: 1 1 calc(50% - 8px);
            min-width: 200px;
        }

        /* Стилі модуля: День */
        .day-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .day-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted-text);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .day-number {
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
            color: var(--accent-color);
        }

        /* Стилі модуля: Годинник */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        .clock-time {
            font-size: 32px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        /* Стилі модуля: Календар Місяця */
        .calendar-container {
            width: 100%;
        }

        .calendar-header {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-color);
            text-transform: capitalize;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .weekday {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted-text);
            padding-bottom: 4px;
            text-transform: uppercase;
        }

        .day-cell {
            font-size: 12px;
            padding: 6px 0;
            border-radius: 6px;
            color: var(--text-color);
        }

        .day-cell.empty {
            visibility: hidden;
        }

        .day-cell.today {
            background-color: var(--accent-color);
            color: var(--accent-text);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <details>
            <summary>⚙️ Конструктор модулів</summary>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-day" checked> Модуль: День
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-clock" checked> Модуль: Годинник
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-calendar" checked> Модуль: Календар
                </label>
            </div>
        </details>
    </div>

    <div class="widget-grid">
        
        <div id="block-day" class="widget-block">
            <div class="day-container">
                <div class="day-title" id="lbl-day-name">---</div>
                <div class="day-number" id="lbl-day-num">00</div>
            </div>
        </div>

        <div id="block-clock" class="widget-block">
            <div class="clock-container">
                <div class="clock-time" id="lbl-clock">00:00:00</div>
            </div>
        </div>

        <div id="block-calendar" class="widget-block w-full">
            <div class="calendar-container">
                <div class="calendar-header" id="calendar-month-year">Місяць Рік</div>
                <div class="calendar-grid" id="calendar-days-grid">
                    </div>
            </div>
        </div>

    </div>

    <script>
        // Елементи чекбоксів
        const chkDay = document.getElementById('chk-day');
        const chkClock = document.getElementById('chk-clock');
        const chkCalendar = document.getElementById('chk-calendar');

        // Елементи блоків коду
        const blockDay = document.getElementById('block-day');
        const blockClock = document.getElementById('block-clock');
        const blockCalendar = document.getElementById('block-calendar');

        // Текстові мітки
        const lblDayName = document.getElementById('lbl-day-name');
        const lblDayNum = document.getElementById('lbl-day-num');
        const lblClock = document.getElementById('lbl-clock');
        const calendarMonthYear = document.getElementById('calendar-month-year');
        const calendarDaysGrid = document.getElementById('calendar-days-grid');

        // Функція оновлення дат та часу
        function updateWidgetData() {
            const now = new Date();

            // 1. Оновлення Дня
            const dayNames = ['Неділя', 'Понед.', 'Вівторок', 'Середа', 'Четвер', 'П'ятниця', 'Субота'];
            lblDayName.textContent = dayNames[now.getDay()];
            lblDayNum.textContent = now.getDate();

            // 2. Оновлення Годинника
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            lblClock.textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Побудова сітки повного місяця
        function buildFullMonthCalendar() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const todayDate = now.getDate();

            // Назва місяця та рік для заголовка
            const monthNames = [
                'Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень',
                'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'
            ];
            calendarMonthYear.textContent = `${monthNames[currentMonth]} ${currentYear}`;

            // Очищення старої сітки
            calendarDaysGrid.innerHTML = '';

            // Дні тижня (Понеділок - Неділя)
            const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'weekday';
                dayHeader.textContent = day;
                calendarDaysGrid.appendChild(dayHeader);
            });

            // Перший день місяця (дізнаємось день тижня)
            const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
            // Перетворюємо неділю (0) в 7, щоб легше рахувати від Пн (1)
            let startDayOfWeek = firstDayOfMonth.getDay();
            if (startDayOfWeek === 0) startDayOfWeek = 7;

            // Кількість днів у місяці
            const totalDaysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Додаємо порожні клітинки для відступу на початку місяця
            for (let i = 1; i < startDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                calendarDaysGrid.appendChild(emptyCell);
            }

            // Додаємо самі числа місяця
            for (let day = 1; day <= totalDaysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                dayCell.textContent = day;

                // Підсвічування сьогоднішнього дня
                if (day === todayDate) {
                    dayCell.className = 'day-cell today';
                }

                calendarDaysGrid.appendChild(dayCell);
            }
        }

        // Логіка відображення та динамічної зміни розмірів сітки (Flex Layout)
        function adjustLayout() {
            const isDayVisible = chkDay.checked;
            const isClockVisible = chkClock.checked;
            const isCalendarVisible = chkCalendar.checked;

            // Показуємо або ховаємо блоки на сторінці
            blockDay.style.display = isDayVisible ? 'block' : 'none';
            blockClock.style.display = isClockVisible ? 'block' : 'none';
            blockCalendar.style.display = isCalendarVisible ? 'block' : 'none';

            // Скидаємо класи адаптивності
            blockDay.className = 'widget-block';
            blockClock.className = 'widget-block';

            // Перевірка логіки розтягування
            if (isCalendarVisible) {
                // Якщо календар є, день і годинник стають половинками поруч
                blockDay.classList.add('w-half');
                blockClock.classList.add('w-half');
            } else {
                // Якщо календаря НЕМАЄ:
                if (isDayVisible && isClockVisible) {
                    // Якщо активні обидва, вони ділять простір 50/50
                    blockDay.classList.add('w-half');
                    blockClock.classList.add('w-half');
                } else {
                    // Якщо залишився тільки День або тільки Годинник — розтягуємо на 100% поля!
                    if (isDayVisible) blockDay.classList.add('w-full');
                    if (isClockVisible) blockClock.classList.add('w-full');
                }
            }
        }

        // Слухачі подій на зміну прапорців
        chkDay.addEventListener('change', adjustLayout);
        chkClock.addEventListener('change', adjustLayout);
        chkCalendar.addEventListener('change', adjustLayout);

        // Старт роботи віджета
        updateWidgetData();
        buildFullMonthCalendar();
        adjustLayout();

        // Щомиті оновлюємо час (годинник) та раз на хвилину перевіряємо дату
        setInterval(updateWidgetData, 1000);
    </script>
</body>
</html>
