<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Adaptive Modular Widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --accent-color: #2383e2;
            --accent-text: #ffffff;
            --border-color: #e9e9e6;
            --hover-color: #f1f1ef;
            --muted-text: #787774;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #ffffff;
                --accent-color: #2383e2;
                --accent-text: #ffffff;
                --border-color: #2f2f2f;
                --hover-color: #242424;
                --muted-text: #9b9b9b;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            user-select: none;
            overflow-x: hidden;
        }

        /* Адаптивне меню налаштувань */
        .settings-container {
            width: 100%;
            margin-bottom: 12px;
            z-index: 100;
            box-sizing: border-box;
        }

        details {
            background: var(--hover-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
        }

        summary {
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            color: var(--muted-text);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Повністю гумова сітка */
        .widget-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .widget-block {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 120px;
        }

        /* Динамічні класи адаптивності під розмір вікна */
        .w-full {
            flex: 1 1 100%;
        }
        
        .w-half {
            flex: 1 1 calc(50% - 5px);
        }

        /* День (Адаптивні шрифти) */
        .day-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
        }

        .day-title {
            font-size: clamp(10px, 2.8vw, 14px);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted-text);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .day-number {
            font-size: clamp(32px, 9vw, 56px);
            font-weight: 800;
            line-height: 1;
            color: var(--accent-color);
        }

        /* Годинник */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
        }

        .clock-time {
            font-size: clamp(22px, 6.5vw, 38px);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        /* Календар */
        .calendar-container {
            width: 100%;
        }

        .calendar-header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 4px;
        }

        .calendar-header {
            font-size: clamp(12px, 3.2vw, 15px);
            font-weight: 600;
            text-align: center;
            flex-grow: 1;
        }

        .btn-nav {
            background: none;
            border: none;
            color: var(--muted-text);
            font-size: clamp(14px, 4vw, 18px);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-nav:hover {
            background-color: var(--hover-color);
            color: var(--text-color);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .weekday {
            font-size: clamp(9px, 2.4vw, 11px);
            font-weight: 600;
            color: var(--muted-text);
            padding-bottom: 2px;
            text-transform: uppercase;
        }

        .day-cell {
            font-size: clamp(10px, 2.6vw, 13px);
            padding: 4px 0;
            border-radius: 4px;
        }

        .day-cell.empty {
            visibility: hidden;
        }

        .day-cell.today {
            background-color: var(--accent-color);
            color: var(--accent-text);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <details>
            <summary>⚙️ Налаштування модулів</summary>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-day" checked> День
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-clock" checked> Годинник
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-calendar" checked> Календар
                </label>
            </div>
        </details>
    </div>

    <div class="widget-grid">
        
        <div id="block-day" class="widget-block">
            <div class="day-container">
                <div class="day-title" id="lbl-day-name">---</div>
                <div class="day-number" id="lbl-day-num">00</div>
            </div>
        </div>

        <div id="block-clock" class="widget-block">
            <div class="clock-container">
                <div class="clock-time" id="lbl-clock">00:00:00</div>
            </div>
        </div>

        <div id="block-calendar" class="widget-block w-full">
            <div class="calendar-container">
                <div class="calendar-header-wrapper">
                    <button class="btn-nav" id="btn-prev">‹</button>
                    <div class="calendar-header" id="calendar-month-year">Місяць Рік</div>
                    <button class="btn-nav" id="btn-next">›</button>
                </div>
                <div class="calendar-grid" id="calendar-days-grid"></div>
            </div>
        </div>

    </div>

    <script>
        const chkDay = document.getElementById('chk-day');
        const chkClock = document.getElementById('chk-clock');
        const chkCalendar = document.getElementById('chk-calendar');

        const blockDay = document.getElementById('block-day');
        const blockClock = document.getElementById('block-clock');
        const blockCalendar = document.getElementById('block-calendar');

        const lblDayName = document.getElementById('lbl-day-name');
        const lblDayNum = document.getElementById('lbl-day-num');
        const lblClock = document.getElementById('lbl-clock');
        const calendarMonthYear = document.getElementById('calendar-month-year');
        const calendarDaysGrid = document.getElementById('calendar-days-grid');
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        // Стан для відстеження активного місяця в календарі
        let currentRenderDate = new Date();

        function updateWidgetData() {
            const now = new Date();
            const dayNames = ['Неділя', 'Понеділок', 'Вівторок', 'Середа', 'Четвер', "П'ятниця", 'Субота'];
            lblDayName.textContent = dayNames[now.getDay()];
            lblDayNum.textContent = now.getDate();

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            lblClock.textContent = `${hours}:${minutes}:${seconds}`;
        }

        function buildFullMonthCalendar() {
            const realNow = new Date();
            const renderYear = currentRenderDate.getFullYear();
            const renderMonth = currentRenderDate.getMonth();

            const monthNames = [
                'Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень',
                'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'
            ];
            calendarMonthYear.textContent = `${monthNames[renderMonth]} ${renderYear}`;

            calendarDaysGrid.innerHTML = '';

            const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'weekday';
                dayHeader.textContent = day;
                calendarDaysGrid.appendChild(dayHeader);
            });

            const firstDayOfMonth = new Date(renderYear, renderMonth, 1);
            let startDayOfWeek = firstDayOfMonth.getDay();
            if (startDayOfWeek === 0) startDayOfWeek = 7;

            const totalDaysInMonth = new Date(renderYear, renderMonth + 1, 0).getDate();

            for (let i = 1; i < startDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                calendarDaysGrid.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDaysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                dayCell.textContent = day;

                // Підсвічуємо сьогоднішній день тільки якщо рендериться поточний місяць і рік
                if (day === realNow.getDate() && renderMonth === realNow.getMonth() && renderYear === realNow.getFullYear()) {
                    dayCell.className = 'day-cell today';
                }
                calendarDaysGrid.appendChild(dayCell);
            }
        }

        function adjustLayout() {
            const isDayVisible = chkDay.checked;
            const isClockVisible = chkClock.checked;
            const isCalendarVisible = chkCalendar.checked;

            blockDay.style.display = isDayVisible ? 'flex' : 'none';
            blockClock.style.display = isClockVisible ? 'flex' : 'none';
            blockCalendar.style.display = isCalendarVisible ? 'flex' : 'none';

            blockDay.className = 'widget-block';
            blockClock.className = 'widget-block';

            if (isCalendarVisible) {
                blockDay.classList.add('w-half');
                blockClock.classList.add('w-half');
            } else {
                if (isDayVisible && isClockVisible) {
                    blockDay.classList.add('w-half');
                    blockClock.classList.add('w-half');
                } else {
                    if (isDayVisible) blockDay.classList.add('w-full');
                    if (isClockVisible) blockClock.classList.add('w-full');
                }
            }
        }

        // Обробники кліків по стрілочках навігації місяців
        btnPrev.addEventListener('click', () => {
            currentRenderDate.setMonth(currentRenderDate.getMonth() - 1);
            buildFullMonthCalendar();
        });

        btnNext.addEventListener('click', () => {
            currentRenderDate.setMonth(currentRenderDate.getMonth() + 1);
            buildFullMonthCalendar();
        });

        chkDay.addEventListener('change', adjustLayout);
        chkClock.addEventListener('change', adjustLayout);
        chkCalendar.addEventListener('change', adjustLayout);

        updateWidgetData();
        buildFullMonthCalendar();
        adjustLayout();

        setInterval(updateWidgetData, 1000);
    </script>
</body>
</html>
