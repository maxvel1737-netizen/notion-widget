<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Універсальний Модульний Віджет</title>
    <style>
        /* Обнулення та базові налаштування для 100% висоти */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden; /* Прибираємо скроли, оскільки віджет адаптується */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Теми оформлення */
        body.light-theme {
            background-color: #ffffff;
            color: #37352f;
        }
        body.dark-theme {
            background-color: #191919;
            color: #ffffff;
        }

        /* Головний контейнер на весь екран */
        .widget-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            padding: 12px;
            gap: 12px;
        }

        /* Верхня панель з кнопками */
        .controls-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px;
        }

        .btn {
            background: rgba(125, 125, 125, 0.12);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: rgba(125, 125, 125, 0.25);
        }

        /* Гнучка сітка для модулів - займає весь залишок висоти */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            flex-grow: 1;
            height: calc(100% - 45px); /* Вираховуємо висоту без панелі керування */
            width: 100%;
        }

        /* Стиль кожної картки (модуля) */
        .card {
            background: rgba(125, 125, 125, 0.05);
            border: 1px solid rgba(125, 125, 125, 0.15);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100%; /* Розтягуємо картку по висоті сітки */
            overflow: hidden;
            position: relative;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        /* Внутрішній контент, що масштабується */
        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Центруємо вміст по висоті */
            align-items: center;
            width: 100%;
            overflow-y: auto;
        }

        /* Модуль: Годинник та День */
        .time-display {
            font-size: 2.8rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .date-display {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 6px;
            text-align: center;
        }

        /* Модуль: Календар днів тижня */
        .calendar-week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            width: 100%;
            gap: 6px;
            text-align: center;
        }
        .day-col {
            display: flex;
            flex-direction: column;
            padding: 8px 4px;
            border-radius: 6px;
            gap: 4px;
        }
        .day-name {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.5;
            text-transform: uppercase;
        }
        .day-num {
            font-size: 16px;
            font-weight: 500;
        }
        .day-col.active {
            background: #2383e2;
            color: #ffffff !important;
        }
        .day-col.active .day-name {
            opacity: 0.9;
        }

        /* Модуль: Конструктор */
        .designer-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .designer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(125, 125, 125, 0.08);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .sort-btns {
            display: flex;
            gap: 4px;
        }
        .sort-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .sort-btn:hover {
            background: rgba(125, 125, 125, 0.2);
        }

        /* Приховати елемент */
        .hidden {
            display: none !important;
        }

        /* Адаптація під вузькі колонки */
        @media (max-width: 550px) {
            .modules-grid {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
            .card {
                height: auto;
                min-height: 120px;
            }
        }
    </style>
</head>
<body class="dark-theme" id="body">

    <div class="widget-container">
        <div class="controls-panel">
            <button class="btn" id="themeToggle" onclick="toggleTheme()">☀️ Світла тема</button>
            <button class="btn" id="configToggle" onclick="toggleConfig()">⚙️ Конструктор</button>
        </div>

        <div class="modules-grid" id="modulesGrid">
            
            <div class="card" id="mod-clock">
                <div class="card-title">🕒 Розумний Годинник</div>
                <div class="card-content">
                    <div class="time-display" id="clockTime">00:00:00</div>
                </div>
            </div>

            <div class="card" id="mod-day">
                <div class="card-title">📅 Поточний День</div>
                <div class="card-content">
                    <div class="date-display" id="dayFull">Завантаження...</div>
                </div>
            </div>

            <div class="card" id="mod-calendar">
                <div class="card-title">📆 Календар Тижня</div>
                <div class="card-content">
                    <div class="calendar-week" id="weekContainer">
                        </div>
                </div>
            </div>

            <div class="card hidden" id="mod-designer">
                <div class="card-title">⚙️ Налаштування модулів</div>
                <div class="card-content">
                    <div class="designer-list" id="designerList">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Ініціалізація та налаштування черговості
        let modulesOrder = ['mod-clock', 'mod-day', 'mod-calendar'];
        const currentActiveDayText = ''; 

        function updateClockAndDate() {
            const now = new Date();
            
            // Оновлюємо годинник
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Оновлюємо дату
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dayFull').textContent = now.toLocaleDateString('uk-UA', options);
        }

        function renderWeekCalendar() {
            const now = new Date();
            const currentDayOfWeek = now.getDay(); // 0 - Нд, 1 - Пн...
            const container = document.getElementById('weekContainer');
            container.innerHTML = '';

            const daysNames = ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            
            // Зсуваємо, щоб тиждень починався з Понеділка
            const mondayIndex = [1, 2, 3, 4, 5, 6, 0];
            
            // Знайдемо дату понеділка поточного тижня
            const currentDay = now.getDay();
            const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
            const mondayDate = new Date(now);
            mondayDate.setDate(now.getDate() + distanceToMonday);

            for (let i = 0; i < 7; i++) {
                const loopDate = new Date(mondayDate);
                loopDate.setDate(mondayDate.getDate() + i);
                
                const dayIndex = loopDate.getDay();
                const isToday = loopDate.toDateString() === now.toDateString();

                const dayCol = document.createElement('div');
                dayCol.className = `day-col ${isToday ? 'active' : ''}`;
                
                dayCol.innerHTML = `
                    <div class="day-name">${daysNames[dayIndex]}</div>
                    <div class="day-num">${loopDate.getDate()}</div>
                `;
                container.appendChild(dayCol);
            }
        }

        // Керування темою
        function toggleTheme() {
            const body = document.getElementById('body');
            const btn = document.getElementById('themeToggle');
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                btn.textContent = '🌙 Темна тема';
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                btn.textContent = '☀️ Світла тема';
            }
        }

        // Показати/приховати конструктор
        function toggleConfig() {
            const designer = document.getElementById('mod-designer');
            designer.classList.toggle('hidden');
            renderDesigner();
        }

        // Робота конструктора переміщення
        function renderDesigner() {
            const container = document.getElementById('designerList');
            container.innerHTML = '';
            
            const namesMap = {
                'mod-clock': '🕒 Розумний Годинник',
                'mod-day': '📅 Поточний День',
                'mod-calendar': '📆 Календар Тижня'
            };

            modulesOrder.forEach((id, index) => {
                const item = document.createElement('div');
                item.className = 'designer-item';
                item.innerHTML = `
                    <span>${namesMap[id]}</span>
                    <div class="sort-btns">
                        <button class="sort-btn" onclick="moveModule(${index}, -1)">▲</button>
                        <button class="sort-btn" onclick="moveModule(${index}, 1)">▼</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function moveModule(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < modulesOrder.length) {
                const temp = modulesOrder[index];
                modulesOrder[index] = modulesOrder[newIndex];
                modulesOrder[newIndex] = temp;
                
                applyOrder();
                renderDesigner();
            }
        }

        function applyOrder() {
            const grid = document.getElementById('modulesGrid');
            modulesOrder.forEach(id => {
                const el = document.getElementById(id);
                if (el) grid.appendChild(el);
            });
            // Конструктор завжди залишається останнім блоком у черзі
            const designer = document.getElementById('mod-designer');
            grid.appendChild(designer);
        }

        // Запуск
        setInterval(updateClockAndDate, 1000);
        updateClockAndDate();
        renderWeekCalendar();
    </script>
</body>
</html>
