<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Modular Widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #f7f7f7;
            --text-color: #37352f;
            --accent-color: #2eaadc;
            --border-color: #e9e9e9;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .dark-theme {
            --bg-color: #191919;
            --card-bg: #202020;
            --text-color: #rgba(255, 255, 255, 0.9);
            --accent-color: #2eaadc;
            --border-color: #2f2f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Головний контейнер */
        .widget-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            padding: 10px;
            position: relative;
        }

        /* Адаптивна сітка модулів */
        .widget-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            align-content: stretch;
        }

        /* Ключове виправлення №2: якщо календар єдиний на нижньому рядку, він розтягується від краю до краю */
        .widget-grid .card-mod[data-id="calendar"] {
            grid-column: 1 / -1;
        }
        
        /* Якщо вікно стає дуже широким і всі поміщаються в один ряд */
        @media (min-width: 600px) {
            .widget-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
            /* Знімаємо розтягування на весь екран, якщо модулі вишикувалися в одну лінію side-by-side */
            .widget-grid:has(.card-mod:nth-child(3)) .card-mod[data-id="calendar"] {
                grid-column: auto;
            }
        }

        /* Базовий стиль карток модулів */
        .card-mod {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            min-width: 0; /* Захист від розпирання */
            min-height: 0;
            overflow: hidden; /* Ключове виправлення №1: текст не вилазить за рамки */
            height: 100%;
            transition: all 0.3s ease;
        }

        /* Модуль День */
        .day-title {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-weight: 500;
            opacity: 0.6;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .day-num {
            font-size: clamp(2.5rem, 10vh, 4.5rem);
            font-weight: 700;
            line-height: 1;
            color: var(--accent-color);
        }

        .month-year {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: 500;
            margin-top: 5px;
            white-space: nowrap;
        }

        /* Модуль Годинник */
        .clock-time {
            font-size: clamp(2rem, 8vh, 3.8rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        /* Модуль Календар */
        .calendar-box {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cal-header {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        /* Сітка самого календаря */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1; /* Ключове виправлення №3: календар заповнює всю висоту картки */
            width: 100%;
            gap: 4px;
        }

        /* Рядки календаря (дні тижня та числа) */
        .cal-item {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(0.75rem, 2vh, 1rem);
            border-radius: 6px;
            transition: background 0.2s;
            min-height: 0;
        }

        /* Дні тижня верхнього рядка */
        .cal-day-name {
            font-weight: 600;
            opacity: 0.5;
            padding-bottom: 4px;
        }

        /* Поточний підсвічений день */
        .cal-item.today {
            background-color: var(--accent-color);
            color: #ffffff;
            font-weight: 700;
        }

        .cal-item.other-month {
            opacity: 0.25;
        }

        /* Кнопка налаштувань (шестірня) */
        .settings-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .settings-btn:hover {
            opacity: 1;
        }

        .settings-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-color);
        }

        /* Панель конструктора */
        .config-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 100;
            padding: 20px;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .config-panel.active {
            display: flex;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
        }

        .config-section {
            margin-bottom: 20px;
        }

        .config-section h3 {
            margin-bottom: 10px;
            font-size: 1rem;
            opacity: 0.8;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        /* Сортування списку */
        .sort-list {
            list-style: none;
        }

        .sort-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 10px;
            margin-bottom: 6px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .sort-btns button {
            background: none;
            border: 1px solid var(--border-color);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-color);
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="widget-grid" id="widgetGrid">
            <div class="card-mod" data-id="day">
                <div class="day-title" id="dayTitle">Неділя</div>
                <div class="day-num" id="dayNum">17</div>
                <div class="month-year" id="monthYear">Травень 2026</div>
            </div>
            <div class="card-mod" data-id="clock">
                <div class="clock-time" id="clockTime">12:00</div>
            </div>
            <div class="card-mod" data-id="calendar">
                <div class="calendar-box">
                    <div class="cal-header" id="calHeader">Травень 2026</div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>
        </div>

        <button class="settings-btn" id="settingsBtn" title="Налаштування розташування">
            <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/></svg>
        </button>
    </div>

    <div class="config-panel" id="configPanel">
        <div class="panel-header">
            <h2>⚙️ Конструктор віджета</h2>
            <button class="close-btn" id="closeBtn">&times;</button>
        </div>

        <div class="config-section">
            <h3>Видимість модулів</h3>
            <div class="toggle-item">
                <span>Показувати День</span>
                <input type="checkbox" id="chkDay" checked>
            </div>
            <div class="toggle-item">
                <span>Показувати Годинник</span>
                <input type="checkbox" id="chkClock" checked>
            </div>
            <div class="toggle-item">
                <span>Показувати Календар</span>
                <input type="checkbox" id="chkCalendar" checked>
            </div>
            <div class="toggle-item">
                <span>Темна тема</span>
                <input type="checkbox" id="chkTheme">
            </div>
        </div>

        <div class="config-section">
            <h3>Порядок розташування (▲ вище / ▼ нижче)</h3>
            <ul class="sort-list" id="sortList">
                <li class="sort-item" data-id="day">
                    <span>📅 Модуль: День</span>
                    <div class="sort-btns">
                        <button class="btn-up">▲</button>
                        <button class="btn-down">▼</button>
                    </div>
                </li>
                <li class="sort-item" data-id="clock">
                    <span>⏰ Модуль: Годинник</span>
                    <div class="sort-btns">
                        <button class="btn-up">▲</button>
                        <button class="btn-down">▼</button>
                    </div>
                </li>
                <li class="sort-item" data-id="calendar">
                    <span>📆 Модуль: Календар</span>
                    <div class="sort-btns">
                        <button class="btn-up">▲</button>
                        <button class="btn-down">▼</button>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const widgetGrid = document.getElementById('widgetGrid');
        const configPanel = document.getElementById('configPanel');
        const settingsBtn = document.getElementById('settingsBtn');
        const closeBtn = document.getElementById('closeBtn');

        const chkDay = document.getElementById('chkDay');
        const chkClock = document.getElementById('chkClock');
        const chkCalendar = document.getElementById('chkCalendar');
        const chkTheme = document.getElementById('chkTheme');
        const sortList = document.getElementById('sortList');

        // Мова та локалізація
        const daysOfWeekList = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
        const monthsList = ['Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень', 'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'];
        const daysFullList = ['Неділя', 'Понеділок', 'Вівторок', 'Середа', 'Четвер', 'П' + 'ятниця', 'Субота'];

        // Завантаження збережених налаштувань
        let order = JSON.parse(localStorage.getItem('notion-mod-order')) || ['day', 'clock', 'calendar'];
        let visibility = JSON.parse(localStorage.getItem('notion-mod-vis')) || { day: true, clock: true, calendar: true };
        let darkTheme = localStorage.getItem('notion-mod-dark') === 'true';

        chkDay.checked = visibility.day;
        chkClock.checked = visibility.clock;
        chkCalendar.checked = visibility.calendar;
        chkTheme.checked = darkTheme;
        if(darkTheme) document.body.classList.add('dark-theme');

        function updateWidgetData() {
            const now = new Date();
            
            // Оновлення модулів "День"
            document.getElementById('dayTitle').innerText = daysFullList[now.getDay()];
            document.getElementById('dayNum').innerText = now.getDate();
            document.getElementById('monthYear').innerText = `${monthsList[now.getMonth()]} ${now.getFullYear()}`;

            // Оновлення "Годинника"
            let hh = String(now.getHours()).padStart(2, '0');
            let mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clockTime').innerText = `${hh}:${mm}`;

            // Заголовок календаря
            document.getElementById('calHeader').innerText = `${monthsList[now.getMonth()]} ${now.getFullYear()}`;
        }

        function buildFullMonthCalendar() {
            const calGrid = document.getElementById('calGrid');
            calGrid.innerHTML = '';
            
            // Додаємо назви днів
            daysOfWeekList.forEach(name => {
                const dayNameBox = document.createElement('div');
                dayNameBox.className = 'cal-item cal-day-name';
                dayNameBox.innerText = name;
                calGrid.appendChild(dayNameBox);
            });

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const todayDate = now.getDate();

            // Перший день місяця
            const firstDay = new Date(year, month, 1);
            // Перетворення дня тижня (0 - нд, міняємо на пн=0...нд=6)
            let startDay = firstDay.getDay() - 1;
            if (startDay === -1) startDay = 6;

            // Кількість днів у поточному місяці
            const totalDays = new Date(year, month + 1, 0).getDate();
            // Кількість днів у попередньому місяці
            const prevTotalDays = new Date(year, month, 0).getDate();

            // Дні попереднього місяця («хвости»)
            for (let i = startDay - 1; i >= 0; i--) {
                const cell = document.createElement('div');
                cell.className = 'cal-item other-month';
                cell.innerText = prevTotalDays - i;
                calGrid.appendChild(cell);
            }

            // Дні поточного місяця
            for (let d = 1; d <= totalDays; d++) {
                const cell = document.createElement('div');
                cell.className = 'cal-item';
                cell.innerText = d;
                if (d === todayDate) {
                    cell.className += ' today';
                }
                calGrid.appendChild(cell);
            }

            // Заповнення порожніх клітинок наприкінці до повної сітки (6 рядків по 7 днів)
            const currentCells = calGrid.children.length - 7; // мінус назви днів
            const remaining = 42 - currentCells; 
            for (let x = 1; x <= remaining; x++) {
                const cell = document.createElement('div');
                cell.className = 'cal-item other-month';
                cell.innerText = x;
                calGrid.appendChild(cell);
            }
        }

        function adjustLayout() {
            visibility.day = chkDay.checked;
            visibility.clock = chkClock.checked;
            visibility.calendar = chkCalendar.checked;

            localStorage.setItem('notion-mod-vis', JSON.stringify(visibility));

            // Застосування видимості та порядку
            const cards = Array.from(widgetGrid.children);
            
            order.forEach((id, index) => {
                const card = cards.find(c => c.getAttribute('data-id') === id);
                if(card) {
                    card.style.order = index;
                    if(visibility[id]) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        }

        function updateDOMOrder() {
            const items = Array.from(sortList.children);
            order = items.map(item => item.getAttribute('data-id'));
            localStorage.setItem('notion-mod-order', JSON.stringify(order));
            adjustLayout();
        }

        // Події конструктора та переміщення
        settingsBtn.onclick = () => configPanel.classList.add('active');
        closeBtn.onclick = () => configPanel.classList.remove('active');

        chkTheme.onchange = () => {
            if(chkTheme.checked) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('notion-mod-dark', 'true');
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('notion-mod-dark', 'false');
            }
        };

        sortList.addEventListener('click', (e) => {
            const target = e.target;
            const currentItem = target.closest('.sort-item');
            if(!currentItem) return;

            if(target.classList.contains('btn-up')) {
                const prevItem = currentItem.previousElementSibling;
                if(prevItem) {
                    sortList.insertBefore(currentItem, prevItem);
                    updateDOMOrder();
                }
            }
            if(target.classList.contains('btn-down')) {
                const nextItem = currentItem.nextElementSibling;
                if(nextItem) {
                    sortList.insertBefore(nextItem, currentItem);
                    updateDOMOrder();
                }
            }
        });

        // Ініціалізація сортувального списку в UI відповідно до збереженого порядку
        function initSortListUI() {
            const items = Array.from(sortList.children);
            order.forEach(id => {
                const el = items.find(i => i.getAttribute('data-id') === id);
                if(el) sortList.appendChild(el);
            });
        }

        chkDay.onchange = adjustLayout;
        chkClock.onchange = adjustLayout;
        chkCalendar.onchange = adjustLayout;
        window.onresize = adjustLayout;

        // Старт
        initSortListUI();
        updateWidgetData();
        buildFullMonthCalendar();
        adjustLayout();
        setInterval(updateWidgetData, 1000);
    </script>
</body>
</html>
