<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Ultimate Modular Widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --accent-color: #2383e2;
            --accent-text: #ffffff;
            --border-color: #e9e9e6;
            --card-bg: #fafafa;
            --hover-color: #f1f1ef;
            --muted-text: #787774;
        }

        .dark-theme {
            --bg-color: #191919;
            --text-color: #ffffff;
            --accent-color: #2383e2;
            --accent-text: #ffffff;
            --border-color: #2f2f2f;
            --card-bg: #202020;
            --hover-color: #2c2c2c;
            --muted-text: #9b9b9b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 12px;
            transition: background 0.3s, color 0.3s;
        }

        /* Адаптивна сітка модулів */
        .widget-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            grid-auto-rows: 1fr;
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        /* Стиль карток-модулів (Рамки) */
        .module-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: none; /* Керується через JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            text-align: center;
            height: 100%;
            width: 100%;
        }

        .module-card.active {
            display: flex;
        }

        /* Загальні динамічні розміри */
        .time-display {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .timezone-label {
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            color: var(--muted-text);
            margin-top: 4px;
        }

        /* --- МОДУЛЬ 1: Місячний календар --- */
        .calendar-month {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 8px;
        }
        .cal-header span {
            font-weight: 600;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
        }
        .cal-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .cal-btn:hover { background-color: var(--hover-color); }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            width: 100%;
            flex-grow: 1;
        }
        .cal-day-name {
            font-weight: 500;
            color: var(--muted-text);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
        }
        .cal-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.75rem, 1.5vw, 1rem);
            border-radius: 4px;
            aspect-ratio: 1;
        }
        .cal-cell.today {
            background-color: var(--accent-color);
            color: var(--accent-text);
            font-weight: bold;
        }
        .cal-cell.empty { opacity: 0.3; }

        /* --- МОДУЛЬ 2: Лінійка Днів --- */
        .days-line-container {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-grow: 1;
        }
        .day-line-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px;
            border-radius: 6px;
            min-width: 35px;
        }
        .day-line-item.active {
            background-color: var(--accent-color);
            color: var(--accent-text);
            font-weight: bold;
        }
        .day-line-name { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 4px; }
        .day-line-num { font-size: 1.1rem; font-weight: 600; }

        /* --- МОДУЛЬ 4: Комбінований --- */
        .mod4-layout {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-around;
            padding: 10px;
            gap: 10px;
        }
        .mod4-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
            border-right: 2px solid var(--border-color);
            padding-right: 15px;
            height: 80%;
        }
        .mod4-dayname {
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            font-weight: bold;
            color: var(--accent-color);
        }
        .mod4-date {
            font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            color: var(--muted-text);
        }
        .mod4-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        /* --- КНОПКА НАЛАШТУВАНЬ --- */
        .settings-trigger {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 999;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .settings-trigger:hover { background-color: var(--hover-color); }

        /* --- ПАНЕЛЬ НАЛАШТУВАНЬ --- */
        .settings-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }
        .settings-menu.open { display: flex; }
        .settings-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .settings-section { margin-bottom: 20px; }
        .settings-section h4 { margin-bottom: 8px; font-size: 1rem; color: var(--muted-text); }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            outline: none;
        }
        
        .close-settings-btn {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background-color: var(--accent-color);
            color: var(--accent-text);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .close-settings-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="settings-trigger" onclick="toggleSettings()">⚙️</div>
