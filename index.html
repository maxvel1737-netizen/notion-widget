<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Modular Widget</title>
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --accent-color: #2eaadc;
            --gray-light: #f1f1ef;
            --gray-text: #787774;
            --border-radius: 8px;
        }

        /* Темна тема для Notion (активується автоматично) */
        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #ffffff;
                --gray-light: #202020;
                --gray-text: #9b9b9b;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
        }

        /* Загальний контейнер */
        .widget-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 100%;
            transition: all 0.3s ease;
        }

        /* Панель керування */
        .control-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--gray-light);
            padding: 6px 12px;
            border-radius: var(--border-radius);
            font-size: 13px;
            gap: 10px;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            background: transparent;
            border: 1px solid var(--gray-text);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--gray-light);
            min-width: 180px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            padding: 10px;
            border-radius: 6px;
            z-index: 10;
            top: 25px;
            left: 0;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--gray-text);
        }

        .dropdown.open .dropdown-content {
            display: flex;
        }

        .dropdown-content label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .dropdown-content select {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--gray-text);
            border-radius: 4px;
            padding: 2px;
            font-size: 11px;
            width: 100%;
            margin-top: 4px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
        }
        .action-btn:hover {
            background: rgba(0,0,0,0.05);
            border-color: var(--gray-text);
        }

        /* Робоче поле віджета */
        .workspace {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            transition: flex-direction 0.3s ease;
        }

        /* Стан віддзеркалення */
        .workspace.mirrored {
            flex-direction: row-reverse;
        }

        /* Модуль День + Годинник */
        .info-module {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-width: 120px;
            flex: 1;
        }

        .day-box {
            display: flex;
            flex-direction: column;
        }

        .day-box .weekday {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-text);
        }

        .day-box .day-num {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin: 5px 0;
        }

        .clock-box {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        /* Модуль Календар */
        .calendar-module {
            min-width: 230px;
            flex: 1.5;
        }

        .cal-header {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
            font-size: 12px;
        }

        .cal-grid .day-name {
            color: var(--gray-text);
            font-weight: 500;
            padding-bottom: 4px;
        }

        .cal-cell {
            padding: 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1;
            border-radius: 4px;
        }

        /* Круглий стиль дат */
        .calendar-module.style-round .cal-cell {
            border-radius: 50%;
        }

        .cal-cell.today {
            background-color: var(--accent-color);
            color: white !important;
            font-weight: bold;
        }

        .cal-cell.empty {
            visibility: hidden;
        }

        /* Ховаємо вимкнені модулі */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="control-panel">
            <div class="left-controls">
                <div class="dropdown" id="configDropdown">
                    <button class="dropdown-btn" onclick="toggleDropdown()">🛠️ Конструктор</button>
                    <div class="dropdown-content">
                        <label><input type="checkbox" id="chkCal" checked onchange="updateModules()"> Календар</label>
                        <label><input type="checkbox" id="chkDay" checked onchange="updateModules()"> Модуль "День"</label>
                        <label><input type="checkbox" id="chkClock" checked onchange="updateModules()"> Модуль "Годинник"</label>
                        <hr style="width:100%; border:0; border-top:1px solid var(--gray-text); margin:4px 0;">
                        <label style="font-size:11px;">Стиль дат:</label>
                        <select id="selCalStyle" onchange="updateCalStyle()">
                            <option value="grid">Квадратна сітка</option>
                            <option value="round">Кружечки</option>
                        </select>
                        <label style="font-size:11px; margin-top:4px;">Часовий пояс:</label>
                        <select id="selTimezone" onchange="updateTime()">
                            <option value="local">Поточний (Браузер)</option>
                            <option value="Europe/Kyiv">Київ (GMT+3)</option>
                            <option value="Europe/London">Лондон (GMT+1)</option>
                            <option value="America/New_York">Нью-Йорк (GMT-4)</option>
                            <option value="Asia/Tokyo">Токіо (GMT+9)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div>
                <button class="action-btn" onclick="toggleMirror()" title="Віддзеркалити вигляд">⇄</button>
            </div>
        </div>

        <div class="workspace" id="workspace">
            
            <div class="info-module" id="infoModule">
                <div class="day-box" id="dayBox">
                    <span class="weekday" id="txtWeekday">---</span>
                    <span class="day-num" id="txtDayNum">00</span>
                </div>
                <div class="clock-box" id="clockBox">00:00:00</div>
            </div>

            <div class="calendar-module" id="calendarModule">
                <div class="cal-header" id="calHeader">Місяць РІК</div>
                <div class="cal-grid" id="calGrid">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // Стан конструктора (збереження в пам'ять браузера, щоб не злітало при оновленні)
        let state = {
            showCal: localStorage.getItem('showCal') !== 'false',
            showDay: localStorage.getItem('showDay') !== 'false',
            showClock: localStorage.getItem('showClock') !== 'false',
            calStyle: localStorage.getItem('calStyle') || 'grid',
            isMirrored: localStorage.getItem('isMirrored') === 'true',
            timezone: localStorage.getItem('timezone') || 'local'
        };

        // Ініціалізація чекбоксів при старті
        document.getElementById('chkCal').checked = state.showCal;
        document.getElementById('chkDay').checked = state.showDay;
        document.getElementById('chkClock').checked = state.showClock;
        document.getElementById('selCalStyle').value = state.calStyle;
        document.getElementById('selTimezone').value = state.timezone;
        if(state.isMirrored) document.getElementById('workspace').classList.add('mirrored');

        function toggleDropdown() {
            document.getElementById('configDropdown').classList.toggle('open');
        }

        // Закриття меню при кліку в іншому місці
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn') && !event.target.closest('.dropdown-content')) {
                document.getElementById('configDropdown').classList.remove('open');
            }
        }

        function toggleMirror() {
            state.isMirrored = !state.isMirrored;
            localStorage.setItem('isMirrored', state.isMirrored);
            document.getElementById('workspace').classList.toggle('mirrored', state.isMirrored);
        }

        function updateCalStyle() {
            state.calStyle = document.getElementById('selCalStyle').value;
            localStorage.setItem('calStyle', state.calStyle);
            const calMod = document.getElementById('calendarModule');
            calMod.classList.toggle('style-round', state.calStyle === 'round');
        }

        function updateModules() {
            state.showCal = document.getElementById('chkCal').checked;
            state.showDay = document.getElementById('chkDay').checked;
            state.showClock = document.getElementById('chkClock').checked;

            localStorage.setItem('showCal', state.showCal);
            localStorage.setItem('showDay', state.showDay);
            localStorage.setItem('showClock', state.showClock);

            document.getElementById('calendarModule').classList.toggle('hidden', !state.showCal);
            document.getElementById('dayBox').classList.toggle('hidden', !state.showDay);
            document.getElementById('clockBox').classList.toggle('hidden', !state.showClock);
            
            // Якщо вимкнено і день, і годинник — ховаємо весь лівий блок
            document.getElementById('infoModule').classList.toggle('hidden', !state.showDay && !state.showClock);
        }

        function updateTime() {
            state.timezone = document.getElementById('selTimezone').value;
            localStorage.setItem('timezone', state.timezone);

            const now = new Date();
            let options = { timeZone: state.timezone === 'local' ? undefined : state.timezone };
            
            // Форматування часу
            options.hour = '2-digit'; options.minute = '2-digit'; options.second = '2-digit'; options.hour12 = false;
            let timeString = now.toLocaleTimeString('uk-UA', options);
            document.getElementById('clockBox').innerText = timeString;

            // Форматування дня
            options.weekday = 'long';
            let weekdayStr = now.toLocaleDateString('uk-UA', options);
            options.day = 'numeric';
            let dayNumStr = now.toLocaleDateString('uk-UA', options);

            document.getElementById('txtWeekday').innerText = weekdayStr;
            document.getElementById('txtDayNum').innerText = dayNumStr;
        }

        function renderCalendar() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const todayDate = now.getDate();

            const monthNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
            document.getElementById('calHeader').innerText = `${monthNames[currentMonth]} ${currentYear}`;

            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';

            // Дні тижня
            const daysMin = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            daysMin.forEach(d => {
                const div = document.createElement('div');
                div.className = 'day-name';
                div.innerText = d;
                grid.appendChild(div);
            });

            // Перший день місяця і кількість днів
            let firstDay = new Date(currentYear, currentMonth, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1; // Адаптація під Понеділок як 1-й день
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Порожні клітинки на початку
            for (let i = 0; i < firstDay; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell empty';
                grid.appendChild(cell);
            }

            // Клітинки з числами
            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                cell.innerText = d;
                if (d === todayDate && state.timezone === 'local') { 
                    // Підсвічуємо сьогодні, якщо вибрано локальний час
                    cell.className += ' today';
                }
                grid.appendChild(cell);
            }
        }

        // Старт роботи
        updateModules();
        updateCalStyle();
        renderCalendar();
        
        updateTime();
        setInterval(updateTime, 1000); // Оновлення часу щосекунди
    </script>
</body>
</html>
